<style>
  :root{
    --cream:#f6efe3;
    --ivory:#faf6ec;
    --lavender:#a994c2;
    --lavender-deep:#7c6699;
    --sage:#8a9a76;
    --bronze-1:#b89a6e;
    --bronze-2:#6b5436;
    --beige:#f0ddbf;
    --brown:#5c4a2e;
    --brown-deep:#3a2e1d;
    --ink:#2c2417;
    --gold:#caa861;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  html,body{margin:0;padding:0;background:var(--brown-deep);}
  body{
    font-family:'Quicksand',sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .stage{
    max-width:480px;
    margin:0 auto;
    position:relative;
    background:var(--cream);
    box-shadow:0 0 70px rgba(0,0,0,.45);
  }
  section{
    min-height:100vh;
    width:100%;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:9vh 8% 7vh;
    text-align:center;
  }

  /* ---------- reveal utility ---------- */
  .reveal{
    opacity:0;
    transform:translateY(26px) scale(.96);
    transition:opacity .95s cubic-bezier(.22,.61,.36,1), transform .95s cubic-bezier(.22,.61,.36,1);
    transition-delay:var(--d,0s);
  }
  .reveal-left{ transform:translate(-46px,8px) scale(.94); }
  .reveal-right{ transform:translate(46px,8px) scale(.94); }
  .in-view .reveal{ opacity:1; transform:translate(0,0) scale(1); }

  /* ---------- floating gold motes (signature motif) ---------- */
  .motes{ position:absolute; inset:0; pointer-events:none; z-index:1; }
  .mote{ position:absolute; width:5px; height:5px; border-radius:50%;
    background:radial-gradient(circle, var(--gold), transparent 72%);
    opacity:0; animation:drift 11s ease-in-out infinite; }
  .mote:nth-child(1){ left:12%; top:70%; animation-delay:0s; }
  .mote:nth-child(2){ left:80%; top:30%; animation-delay:2.2s; width:4px; height:4px;}
  .mote:nth-child(3){ left:30%; top:20%; animation-delay:4.4s; }
  .mote:nth-child(4){ left:65%; top:80%; animation-delay:6.6s; width:3px; height:3px;}
  .mote:nth-child(5){ left:50%; top:50%; animation-delay:1.1s; }
  .mote:nth-child(6){ left:90%; top:60%; animation-delay:3.3s; width:6px; height:6px;}
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    15%{ opacity:.7; }
    50%{ opacity:.5; }
    100%{ transform:translateY(-90px) translateX(14px); opacity:0; }
  }

  .scrollcue{ position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    width:22px; height:22px; opacity:.6; z-index:2; }
  .scrollcue svg{ width:100%; height:100%; animation:bob 1.8s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(7px);} }

    transition:transform 1s cubic-bezier(.4,0,.2,1), opacity .9s ease;
  }
  .env-shade{
    position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(20,14,8,0) 55%, rgba(18,12,6,.62) 100%);
    transition:opacity .8s ease;
  }
  .seal-glow{
    position:absolute; left:49.5%; top:48.8%; width:34%; aspect-ratio:1/1;
    transform:translate(-50%,-50%) scale(1);
    border:1.5px solid rgba(255,238,205,.55);
    border-radius:50%;
    box-shadow:0 0 0 0 rgba(255,228,170,.35);
    animation:pulse 2.6s ease-in-out infinite;
    transition:transform .9s ease, opacity .7s ease;
    pointer-events:none;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,228,170,.28); }
    50%{ box-shadow:0 0 0 14px rgba(255,228,170,0); }
  }
  .env-prompt{
    position:absolute; bottom:8%; left:0; right:0; z-index:2;
    color:#f7eede; text-align:center;
    transition:opacity .5s ease;
  }
  .env-prompt p{ margin:0 0 6px; font-family:'Mrs Saint Delafield',cursive; font-size:1.9rem; letter-spacing:.5px;}
  .env-prompt span{ font-size:.72rem; text-transform:uppercase; letter-spacing:.22em; opacity:.85; }
  .env-chev{ margin:10px auto 0; width:16px; height:16px; opacity:.8; animation:bob 1.8s ease-in-out infinite; }

  #envelope.opened .env-bg{ transform:scale(1.05); }
  #envelope.opened .env-shade{ opacity:.4; }
  #envelope.opened .seal-glow{ transform:translate(-50%,-50%) scale(2.6); opacity:0; }
  #envelope.opened .env-prompt{ opacity:0; }

  /* ===================== SECTION 2 — INVITATION ===================== */
  #invite{ background:var(--ivory); }
  #invite::before, #invite::after{
    content:''; position:absolute; left:0; right:0; height:26px; z-index:1;
    background:repeating-linear-gradient(115deg, var(--cream) 0 14px, transparent 14px 16px);
  }
  #invite::before{ top:0; }
  #invite::after{ bottom:0; transform:scaleY(-1); }

  .lav-sprig{ width:64px; }
  .lav-top{ margin-bottom:6px; }
  .lav-bottom{ margin-top:10px; }
  .invite-top-row{ position:relative; width:100%; display:flex; justify-content:center; }
  .loose-bud{ position:absolute; top:6%; right:14%; width:20px; transform:rotate(18deg); }
  .loose-bud2{ position:absolute; bottom:8%; right:10%; width:16px; transform:rotate(-12deg); }

  .medallion{
    width:78px; height:78px; border-radius:50%; margin:18px auto 0;
    background:radial-gradient(circle at 32% 30%, #cdb083, var(--bronze-1) 45%, var(--bronze-2) 100%);
    box-shadow:inset 0 2px 4px rgba(255,255,255,.35), inset 0 -3px 6px rgba(0,0,0,.35), 0 6px 14px rgba(0,0,0,.18);
    display:flex; align-items:center; justify-content:center;
  }
  .medallion-spin{ animation:spin 50s linear infinite; width:46px; height:46px; }
  .medallion-spin svg{ width:100%; height:100%; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .invite-title{
    font-family:'Mrs Saint Delafield',cursive; font-size:3rem; color:var(--brown-deep);
    margin:22px 0 18px;
  }

  .petal-cluster{ position:relative; width:70px; height:34px; margin:0 auto; }
  .petal-cluster span{ position:absolute; width:9px; height:13px; border-radius:60% 60% 60% 0;
    background:linear-gradient(160deg, var(--lavender), var(--lavender-deep)); }
  .petal-cluster span:nth-child(1){ left:0; top:6px; transform:rotate(-20deg); }
  .petal-cluster span:nth-child(2){ left:18px; top:0; transform:rotate(12deg); }
  .petal-cluster span:nth-child(3){ left:38px; top:10px; transform:rotate(-8deg); }
  .petal-cluster span:nth-child(4){ left:54px; top:2px; transform:rotate(22deg); }

  .dew{ position:relative; }
  .dew::after{ content:''; position:absolute; width:6px; height:8px; border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    background:linear-gradient(160deg, rgba(255,255,255,.9), rgba(200,220,255,.4));
    top:14px; right:10px; }

  /* ===================== SECTION 3 — COUPLE ===================== */
  #couple{ background:var(--beige); }
  .corner{ position:absolute; width:120px; opacity:.55; z-index:0; }
  .corner.tl{ top:-10px; left:-18px; }
  .corner.tr{ top:-10px; right:-18px; transform:scaleX(-1); }
  .corner.bl{ bottom:-14px; left:-22px; transform:scaleY(-1); }
  .corner.br{ bottom:-14px; right:-22px; transform:scale(-1,-1); }

  .eyebrow-script{ font-family:'Mrs Saint Delafield',cursive; font-size:1.7rem; color:var(--brown-deep); z-index:2;}
  .name-script{ font-family:'Mrs Saint Delafield',cursive; font-size:4rem; line-height:1; color:var(--ink); z-index:2; }
  .amp{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:2.4rem; color:var(--brown); margin:2px 0; z-index:2; }
  .wed-date{ font-family:'Quicksand',sans-serif; font-weight:600; letter-spacing:.32em; font-size:.95rem; color:var(--brown-deep); margin-top:14px; z-index:2; }
  .badge{
    margin-top:18px; padding:13px 30px; border-radius:30px; background:var(--brown); color:var(--ivory);
    font-size:.74rem; letter-spacing:.28em; text-transform:uppercase; font-weight:600; z-index:2;
    box-shadow:0 8px 18px rgba(58,46,29,.25);
  }
  .photo-stack{ width:100%; max-width:380px; margin-top:30px; z-index:2; display:flex; justify-content:center; align-items:center; gap:18px; }
  .photo-card-outer{ flex-shrink:0; }
  .photo-card{
    border-radius:18px; overflow:hidden; box-shadow:0 14px 24px rgba(40,30,15,.28);
    border:4px solid #fbf6ec; background:linear-gradient(150deg,#e8cfd6,#d9c2c9);
    display:flex; align-items:center; justify-content:center;
  }
  .photo-card.a{ width:148px; height:158px; transform:rotate(-6deg); }
  .photo-card.b{ width:168px; height:168px; transform:rotate(5deg); }
  .photo-card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-card .ph-icon{ width:34%; opacity:.55; }

  /* ===================== SECTION 4 — COUNTDOWN ===================== */
  #countdown{ background:var(--beige); }
  .cd-heading{ font-family:'Yellowtail',cursive; font-size:2.5rem; color:var(--brown-deep); z-index:2; }
  .cd-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%; max-width:340px; margin:28px 0 22px; z-index:2; }
  .cd-box{ background:var(--brown); border-radius:18px; padding:18px 6px; box-shadow:0 10px 20px rgba(58,46,29,.25); }
  .cd-num{ font-family:'Baloo 2',sans-serif; font-weight:700; font-size:2.5rem; color:#fbf6ec; line-height:1; }
  .cd-label{ font-size:.72rem; letter-spacing:.14em; color:#e7d9bf; text-transform:uppercase; margin-top:6px; }
  .cd-sub{ font-family:'Yellowtail',cursive; font-size:1.5rem; color:var(--brown-deep); z-index:2; }
  .cd-couple-wrap{ width:78%; max-width:280px; margin-top:18px; z-index:2; }
  .cd-couple-wrap img{ width:100%; display:block; }
  .cd-float{ display:inline-block; animation:floaty 4.2s ease-in-out infinite; }
  @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-9px); } }

  /* ===================== SECTION 5 — VENUE ===================== */
  #venue{ padding:0; color:#f7f1e4; }
  .venue-photo-wrap{
    position:absolute; inset:0; overflow:hidden;
  }
  .venue-photo-wrap img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center;
    transform:scale(1.12); opacity:0;
    transition:opacity 1.3s ease, transform 9s cubic-bezier(.2,.6,.2,1);
  }
  #venue.in-view .venue-photo-wrap img{ transform:scale(1); opacity:1; }

  /* ===================== SECTION 6 — LOCATION ===================== */
  #location{ background:var(--beige); }
  .loc-icon-wrap{ width:62%; max-width:230px; z-index:2; }
  .loc-icon-wrap img{ width:100%; display:block; }
  .loc-bounce{ display:inline-block; animation:bounce 3.4s ease-in-out infinite; }
  @keyframes bounce{ 0%,100%{ transform:translateY(0) rotate(0deg); } 50%{ transform:translateY(-10px) rotate(1.2deg); } }
  .loc-title{ font-family:'Baloo 2',sans-serif; font-weight:700; font-size:2.5rem; color:var(--ink); margin-top:14px; z-index:2; }
  .loc-btn{
    margin-top:22px; padding:14px 32px; border-radius:30px; background:var(--brown); color:var(--ivory);
    font-size:.85rem; letter-spacing:.2em; text-transform:uppercase; font-weight:600; text-decoration:none;
    box-shadow:0 10px 20px rgba(58,46,29,.28); transition:transform .15s ease;
    z-index:2; display:inline-block;
  }

<script>
(function(){
  // ---------- scroll-reveal ----------
  var sections = document.querySelectorAll('section');
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('in-view'); }
    });
  }, { threshold: .32 });
  sections.forEach(function(s){ io.observe(s); });

  // ---------- envelope open ----------
  var env = document.getElementById('envelope');
  var invite = document.getElementById('invite');

  // reset so scrolling back up always shows a fresh, tappable envelope (never blank)
  var envResetIO = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(!e.isIntersecting && env.classList.contains('opened')){
        env.classList.remove('opened');
      }
    });
  }, { threshold: 0 });
  envResetIO.observe(env);

  function openEnvelope(){
    if(env.classList.contains('opened')) return;
    env.classList.add('opened');
    setTimeout(function(){
      invite.scrollIntoView({ behavior:'smooth', block:'start' });
    }, 650);
  }
  env.addEventListener('click', openEnvelope);
  env.addEventListener('keydown', function(ev){
    if(ev.key === 'Enter' || ev.key === ' '){ ev.preventDefault(); openEnvelope(); }
  });

  // ---------- countdown (Cairo local time, DST-safe) ----------
  function cairoWallTimeToUTC(y,m,d,h,mi,s){
    var guess = new Date(Date.UTC(y, m-1, d, h, mi, s));
    for(var i=0;i<3;i++){
      var parts = new Intl.DateTimeFormat('en-US', {
        timeZone:'Africa/Cairo', year:'numeric', month:'2-digit', day:'2-digit',
        hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
      }).formatToParts(guess);
      var o = {};
      parts.forEach(function(p){ o[p.type] = p.value; });
      var hh = o.hour === '24' ? 0 : parseInt(o.hour,10);
      var cairoAsUTC = Date.UTC(parseInt(o.year,10), parseInt(o.month,10)-1, parseInt(o.day,10), hh, parseInt(o.minute,10), parseInt(o.second,10));
      var target = Date.UTC(y, m-1, d, h, mi, s);
      var diff = target - cairoAsUTC;
      if(diff === 0) break;
      guess = new Date(guess.getTime() + diff);
    }
    return guess;
  }

  var weddingMoment = cairoWallTimeToUTC(2026, 6, 26, 21, 0, 0);

  function pad(n){ return n < 10 ? '0'+n : ''+n; }
  function tick(){
    var now = new Date();
    var diff = weddingMoment.getTime() - now.getTime();
    var dEl = document.getElementById('cd-days'),
        hEl = document.getElementById('cd-hours'),
        mEl = document.getElementById('cd-mins'),
        sEl = document.getElementById('cd-secs'),
        subEl = document.getElementById('cd-sub');
    if(diff <= 0){
      dEl.textContent = hEl.textContent = mEl.textContent = sEl.textContent = '00';
      if(subEl) subEl.textContent = 'Forever Has Begun 💍';
      return;
    }
    var totalSec = Math.floor(diff/1000);
    var days = Math.floor(totalSec / 86400);
    var hours = Math.floor((totalSec % 86400) / 3600);
    var mins = Math.floor((totalSec % 3600) / 60);
    var secs = totalSec % 60;
    dEl.textContent = pad(days);
    hEl.textContent = pad(hours);
    mEl.textContent = pad(mins);
    sEl.textContent = pad(secs);
  }
  tick();
  setInterval(tick, 1000);
})();
</script>
